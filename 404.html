<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ВМ-Торг</title>
<script>
  // Single-page site: send any unknown path back to the home page,
  // preserving the repo subpath on GitHub Pages (e.g. /reponame/).
  (function () {
    var base = location.pathname.replace(/\/[^\/]*$/, '/');
    location.replace(base);
  })();
</script>
</head>

</html>
