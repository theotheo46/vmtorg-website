<style>
  /* Branded loading state shown while scripts load and React mounts */
  #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:#1a120c;z-index:9999;
    transition:opacity .5s ease;font-family:"Cormorant Garamond",Georgia,serif}
  #boot .bm{width:62px;height:62px;border-radius:14px;background:#5e3c25;color:#f4efe7;
    display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;
    letter-spacing:.02em;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  #boot .ld{width:38px;height:2px;background:rgba(244,239,231,.18);overflow:hidden;border-radius:2px}
  #boot .ld i{display:block;width:40%;height:100%;background:#9c7b58;
    animation:bootln 1.1s ease-in-out infinite}
  @keyframes bootln{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
  #boot.hide{opacity:0;pointer-events:none}
</style>

<body>
<div id="boot"><div class="bm">ВМ</div><div class="ld"><i></i></div></div>

<!-- Precompiled from tweaks-panel.jsx / app.jsx (see those files for source; rebuild with Babel after editing) -->

<script src="app.js?v=14"></script>

<script>
  // Hide the boot splash once React has mounted into #root.
  (function () {
    var boot = document.getElementById('boot');
    var root = document.getElementById('root');
    var done = function () { boot.classList.add('hide'); setTimeout(function () { boot.remove(); }, 600); };
    var obs = new MutationObserver(function () { if (root.childNodes.length) { obs.disconnect(); done(); } });
    obs.observe(root, { childList: true });
    setTimeout(function () { obs.disconnect(); done(); }, 8000); // safety fallback
  })();
</script>
